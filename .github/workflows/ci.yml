name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  macos-swift:
    name: macOS Swift
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run Swift tests
        run: swift test

      - name: Build Swift package
        run: swift build

  windows-dotnet:
    name: Windows .NET
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Windows tests
        run: dotnet test windows/Moongate.Win.sln --nologo -v minimal

      - name: Publish Windows app smoke
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "moongate-win-publish"
          dotnet publish windows/MoongateApp/MoongateApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:EnableWindowsTargeting=true `
            -p:Version="0.0.0-ci" `
            -o $publishDir `
            --nologo
          if (-not (Test-Path (Join-Path $publishDir "Moongate.exe"))) {
            Write-Error "Publish smoke failed: Moongate.exe was not produced."
            exit 1
          }

  subtitle-timing-eval:
    name: Subtitle timing eval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run subtitle timing unittest smoke
        env:
          PYTHONPATH: tools/subtitle_timing_eval
        run: python -m unittest discover -s tools/subtitle_timing_eval/tests
