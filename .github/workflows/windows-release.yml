name: Build Windows release asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload to
        required: true
        default: v0.8.0-rc.1
      version:
        description: App version
        required: true
        default: 0.8.0-rc.1

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate release version inputs
        shell: pwsh
        run: |
          $expectedTag = "v${{ inputs.version }}"
          if ("${{ inputs.tag }}" -ne $expectedTag) {
            Write-Error "Release tag/version mismatch: tag must be $expectedTag when version is ${{ inputs.version }}."
            exit 1
          }

      - name: Run Windows core tests
        run: dotnet test windows/Moongate.Win.sln --nologo -v minimal

      - name: Publish self-contained app
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "win-publish"
          dotnet publish windows/MoongateApp/MoongateApp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:EnableWindowsTargeting=true `
            -p:Version="${{ inputs.version }}" `
            -o $publishDir `
            --nologo

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "win-publish"
          $outFile = Join-Path $env:RUNNER_TEMP "Moongate-Windows-Setup-v${{ inputs.version }}.exe"
          $iconPath = Join-Path $PWD "windows\assets\app-nsis.ico"
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "${env:ProgramFiles}\NSIS\makensis.exe"
          }
          & $makensis /INPUTCHARSET UTF8 `
            "/DPUBLISH_DIR=$publishDir" `
            "/DOUTFILE=$outFile" `
            "/DAPPVERSION=${{ inputs.version }}" `
            "/DICON_PATH=$iconPath" `
            "windows/installer/installer.nsi"
          $hash = (Get-FileHash -Algorithm SHA256 $outFile).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $outFile)" | Set-Content -Encoding ascii "$outFile.sha256"

      - name: Upload installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $outFile = Join-Path $env:RUNNER_TEMP "Moongate-Windows-Setup-v${{ inputs.version }}.exe"
          gh release upload "${{ inputs.tag }}" $outFile "$outFile.sha256" --repo "${{ github.repository }}" --clobber
